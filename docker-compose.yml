version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: flight-reservation-postgres
    environment:
      POSTGRES_DB: flight_reservation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight_reservation"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
